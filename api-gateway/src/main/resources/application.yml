server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - Authorization
            maxAge: 3600

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      routes:
        # Auth endpoints — public
        - id: user-service-auth
          uri: lb://user-service
          predicates:
            - Path=/api/v1/auth/**

        # User profile endpoints
        - id: user-service-users
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**

        # Admin endpoints
        - id: user-service-admin
          uri: lb://user-service
          predicates:
            - Path=/api/v1/admin/**

        # Internal endpoints — BLOCKED from external access
        # These should only be accessed via service-to-service calls
        # The gateway rejects any external request to /internal/**
        - id: internal-block
          uri: no://op
          predicates:
            - Path=/internal/**
          filters:
            - SetStatus=403

        # User service Swagger docs
        - id: user-service-docs
          uri: lb://user-service
          predicates:
            - Path=/user-service/v3/api-docs/**
          filters:
            - RewritePath=/user-service/(?<segment>.*), /${segment}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    enabled: true

  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui
    urls:
      - name: User Service
        url: /user-service/v3/api-docs

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: INFO
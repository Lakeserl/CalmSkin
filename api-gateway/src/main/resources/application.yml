server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "${CORS_ALLOWED_ORIGIN:http://localhost:3000}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - X-Requested-With
              - Accept
            allowCredentials: true
            exposedHeaders:
              - Authorization
            maxAge: 3600

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      routes:
        # Auth endpoints — public
        - id: user-service-auth
          uri: lb://user-service
          predicates:
            - Path=/api/v1/auth/**

        # User profile endpoints
        - id: user-service-users
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**

        # Product endpoints
        - id: product-service-products
          uri: lb://product-service
          predicates:
            - Path=/api/v1/products/**,/api/v1/categories/**,/api/v1/brands/**,/api/v1/ingredients/**

        # Recommendations (ai-recommendation-service)
        - id: ai-recommendation-service-public
          uri: lb://ai-recommendation-service
          predicates:
            - Path=/api/v1/recommendations/**

        # Skincare routine builder (served by product-service)
        - id: product-service-routines
          uri: lb://product-service
          predicates:
            - Path=/api/v1/routines/**
            
        - id: user-service-admin
          uri: lb://user-service
          predicates:
            - Path=/api/v1/admin/users/**
            
        - id: product-service-admin
          uri: lb://product-service
          predicates:
            - Path=/api/v1/admin/products/**,/api/v1/admin/categories/**,/api/v1/admin/brands/**,/api/v1/admin/ingredients/**

        - id: inventory-service-inventory
          uri: lb://inventory-service
          predicates:
            - Path=/api/v1/inventory/**
            
        - id: inventory-service-admin
          uri: lb://inventory-service
          predicates:
            - Path=/api/v1/admin/inventory/**

        - id: order-service-orders
          uri: lb://order-service
          predicates:
            - Path=/api/v1/orders/**

        - id: order-service-admin
          uri: lb://order-service
          predicates:
            - Path=/api/v1/admin/orders/**

        - id: payment-service-payments
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/payments/**

        - id: payment-service-admin
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/admin/payments/**

        - id: notification-service-notifications
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**

        - id: notification-service-admin
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/admin/notifications/**

        - id: promotion-service-promotions
          uri: lb://promotion-service
          predicates:
            - Path=/api/v1/promotions/**

        - id: promotion-service-admin
          uri: lb://promotion-service
          predicates:
            - Path=/api/v1/admin/promotions/**

        # Review service
        - id: review-service-reviews
          uri: lb://review-service
          predicates:
            - Path=/api/v1/reviews/**

        - id: review-service-admin
          uri: lb://review-service
          predicates:
            - Path=/api/v1/admin/reviews/**

        # Shipping service — customer tracking
        - id: shipping-service-shipments
          uri: lb://shipping-service
          predicates:
            - Path=/api/v1/shipments/**

        - id: shipping-service-admin
          uri: lb://shipping-service
          predicates:
            - Path=/api/v1/admin/shipments/**

        # Subscription service — customer subscriptions
        - id: subscription-service-subscriptions
          uri: lb://subscription-service
          predicates:
            - Path=/api/v1/subscriptions/**

        - id: subscription-service-admin
          uri: lb://subscription-service
          predicates:
            - Path=/api/v1/admin/subscriptions/**

        # AI Skin Analysis service
        - id: ai-skin-analysis-service-public
          uri: lb://ai-skin-analysis-service
          predicates:
            - Path=/api/v1/ai/skin-analysis/**

        - id: ai-skin-analysis-service-admin
          uri: lb://ai-skin-analysis-service
          predicates:
            - Path=/api/v1/admin/ai/skin-analysis/**

        # AI Chatbot service
        - id: ai-chatbot-service-public
          uri: lb://ai-chatbot-service
          predicates:
            - Path=/api/v1/ai/chat/**

        - id: ai-chatbot-service-admin
          uri: lb://ai-chatbot-service
          predicates:
            - Path=/api/v1/admin/ai/chat/**

        # Search service
        - id: search-service-public
          uri: lb://search-service
          predicates:
            - Path=/api/v1/search/**

        # Internal endpoints — BLOCKED from external access
        # These should only be accessed via service-to-service calls
        # The gateway rejects any external request to /internal/**
        - id: internal-block
          uri: no://op
          predicates:
            - Path=/internal/**
          filters:
            - SetStatus=403

        - id: user-service-docs
          uri: lb://user-service
          predicates:
            - Path=/user-service/v3/api-docs/**
          filters:
            - RewritePath=/user-service/(?<segment>.*), /${segment}
        
        - id: product-service-docs
          uri: lb://product-service
          predicates:
            - Path=/product-service/v3/api-docs/**
          filters:
            - RewritePath=/product-service/(?<segment>.*), /${segment}

        - id: inventory-service-docs
          uri: lb://inventory-service
          predicates:
            - Path=/inventory-service/v3/api-docs/**
          filters:
            - RewritePath=/inventory-service/(?<segment>.*), /${segment}

        - id: order-service-docs
          uri: lb://order-service
          predicates:
            - Path=/order-service/v3/api-docs/**
          filters:
            - RewritePath=/order-service/(?<segment>.*), /${segment}

        - id: payment-service-docs
          uri: lb://payment-service
          predicates:
            - Path=/payment-service/v3/api-docs/**
          filters:
            - RewritePath=/payment-service/(?<segment>.*), /${segment}

        - id: notification-service-docs
          uri: lb://notification-service
          predicates:
            - Path=/notification-service/v3/api-docs/**
          filters:
            - RewritePath=/notification-service/(?<segment>.*), /${segment}

        - id: promotion-service-docs
          uri: lb://promotion-service
          predicates:
            - Path=/promotion-service/v3/api-docs/**
          filters:
            - RewritePath=/promotion-service/(?<segment>.*), /${segment}

        - id: review-service-docs
          uri: lb://review-service
          predicates:
            - Path=/review-service/v3/api-docs/**
          filters:
            - RewritePath=/review-service/(?<segment>.*), /${segment}

        - id: shipping-service-docs
          uri: lb://shipping-service
          predicates:
            - Path=/shipping-service/v3/api-docs/**
          filters:
            - RewritePath=/shipping-service/(?<segment>.*), /${segment}

        - id: subscription-service-docs
          uri: lb://subscription-service
          predicates:
            - Path=/subscription-service/v3/api-docs/**
          filters:
            - RewritePath=/subscription-service/(?<segment>.*), /${segment}

        - id: ai-skin-analysis-service-docs
          uri: lb://ai-skin-analysis-service
          predicates:
            - Path=/ai-skin-analysis-service/v3/api-docs/**
          filters:
            - RewritePath=/ai-skin-analysis-service/(?<segment>.*), /${segment}

        - id: ai-chatbot-service-docs
          uri: lb://ai-chatbot-service
          predicates:
            - Path=/ai-chatbot-service/v3/api-docs/**
          filters:
            - RewritePath=/ai-chatbot-service/(?<segment>.*), /${segment}

        - id: ai-recommendation-service-docs
          uri: lb://ai-recommendation-service
          predicates:
            - Path=/ai-recommendation-service/v3/api-docs/**
          filters:
            - RewritePath=/ai-recommendation-service/(?<segment>.*), /${segment}

        - id: search-service-docs
          uri: lb://search-service
          predicates:
            - Path=/search-service/v3/api-docs/**
          filters:
            - RewritePath=/search-service/(?<segment>.*), /${segment}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    enabled: true

  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui
    urls:
      - name: User Service
        url: /user-service/v3/api-docs
      - name: Product Service
        url: /product-service/v3/api-docs
      - name: Inventory Service
        url: /inventory-service/v3/api-docs
      - name: Order Service
        url: /order-service/v3/api-docs
      - name: Payment Service
        url: /payment-service/v3/api-docs
      - name: Notification Service
        url: /notification-service/v3/api-docs
      - name: Promotion Service
        url: /promotion-service/v3/api-docs
      - name: Review Service
        url: /review-service/v3/api-docs
      - name: Shipping Service
        url: /shipping-service/v3/api-docs
      - name: Subscription Service
        url: /subscription-service/v3/api-docs
      - name: AI Skin Analysis Service
        url: /ai-skin-analysis-service/v3/api-docs
      - name: AI Chatbot Service
        url: /ai-chatbot-service/v3/api-docs
      - name: AI Recommendation Service
        url: /ai-recommendation-service/v3/api-docs
      - name: Search Service
        url: /search-service/v3/api-docs

management:
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.1}
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:dev}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.9,0.95,0.99

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: INFO
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"

app:
  jwt:
    secret: ${JWT_SECRET}
  internal-secret: ${INTERNAL_SECRET}
server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - Authorization
            maxAge: 3600

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      routes:
        # Auth endpoints — public
        - id: user-service-auth
          uri: lb://user-service
          predicates:
            - Path=/api/v1/auth/**

        # User profile endpoints
        - id: user-service-users
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**

        # Product endpoints
        - id: product-service-products
          uri: lb://product-service
          predicates:
            - Path=/api/v1/products/**,/api/v1/categories/**,/api/v1/brands/**,/api/v1/ingredients/**
            
        - id: user-service-admin
          uri: lb://user-service
          predicates:
            - Path=/api/v1/admin/users/**
            
        - id: product-service-admin
          uri: lb://product-service
          predicates:
            - Path=/api/v1/admin/products/**,/api/v1/admin/categories/**,/api/v1/admin/brands/**,/api/v1/admin/ingredients/**

        - id: inventory-service-inventory
          uri: lb://inventory-service
          predicates:
            - Path=/api/v1/inventory/**
            
        - id: inventory-service-admin
          uri: lb://inventory-service
          predicates:
            - Path=/api/v1/admin/inventory/**

        - id: order-service-orders
          uri: lb://order-service
          predicates:
            - Path=/api/v1/orders/**

        - id: order-service-admin
          uri: lb://order-service
          predicates:
            - Path=/api/v1/admin/orders/**

        - id: payment-service-payments
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/payments/**

        - id: payment-service-admin
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/admin/payments/**

        # Internal endpoints — BLOCKED from external access
        # These should only be accessed via service-to-service calls
        # The gateway rejects any external request to /internal/**
        - id: internal-block
          uri: no://op
          predicates:
            - Path=/internal/**
          filters:
            - SetStatus=403

        - id: user-service-docs
          uri: lb://user-service
          predicates:
            - Path=/user-service/v3/api-docs/**
          filters:
            - RewritePath=/user-service/(?<segment>.*), /${segment}
        
        - id: product-service-docs
          uri: lb://product-service
          predicates:
            - Path=/product-service/v3/api-docs/**
          filters:
            - RewritePath=/product-service/(?<segment>.*), /${segment}

        - id: inventory-service-docs
          uri: lb://inventory-service
          predicates:
            - Path=/inventory-service/v3/api-docs/**
          filters:
            - RewritePath=/inventory-service/(?<segment>.*), /${segment}

        - id: order-service-docs
          uri: lb://order-service
          predicates:
            - Path=/order-service/v3/api-docs/**
          filters:
            - RewritePath=/order-service/(?<segment>.*), /${segment}

        - id: payment-service-docs
          uri: lb://payment-service
          predicates:
            - Path=/payment-service/v3/api-docs/**
          filters:
            - RewritePath=/payment-service/(?<segment>.*), /${segment}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    enabled: true

  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui
    urls:
      - name: User Service
        url: /user-service/v3/api-docs
      - name: Product Service
        url: /product-service/v3/api-docs
      - name: Inventory Service
        url: /inventory-service/v3/api-docs
      - name: Order Service
        url: /order-service/v3/api-docs
      - name: Payment Service
        url: /payment-service/v3/api-docs

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:dev}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.9,0.95,0.99

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: INFO
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"

app:
  jwt:
    secret: ${JWT_SECRET}
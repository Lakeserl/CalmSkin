server:
  port: 8091

spring:
  application:
    name: ai-chatbot-service
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/${POSTGRES_DB_CHATBOT:calmskin_chatbot}}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: chatbot-pool
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: false
    generate-ddl: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379

  ai:
    google:
      gemini:
        api-key: ${GEMINI_API_KEY:dummy-key-replace-me}
        chat:
          options:
            model: ${GEMINI_MODEL_TEXT:gemini-1.5-flash}
            temperature: 0.7
        embedding:
          options:
            model: ${GEMINI_EMBEDDING_MODEL:text-embedding-004}

    vectorstore:
      pgvector:
        initialize-schema: false     # schema managed by Flyway V2
        dimensions: 768              # Gemini text-embedding-004 output dimension
        distance-type: COSINE_DISTANCE
        index-type: HNSW

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.1}
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:dev}

springdoc:
  swagger-ui:
    path: /docs

app:
  internal:
    secret: ${INTERNAL_SECRET}
  ai:
    daily-limit-chatbot: ${AI_DAILY_LIMIT_CHATBOT:50}

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"
  level:
    root: INFO
    com.lakeserl.ai_chatbot_service: INFO
    org.springframework.ai: INFO

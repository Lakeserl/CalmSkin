<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${subject}">CalmSKIN</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f7;font-family:Arial,Helvetica,sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f7;">
    <tr>
        <td align="center" style="padding:24px 12px;">
            <table role="presentation" width="600" cellpadding="0" cellspacing="0"
                   style="max-width:600px;width:100%;background-color:#ffffff;border-radius:8px;overflow:hidden;">
                <tr>
                    <td style="background-color:#2e7d68;padding:24px;text-align:center;">
                        <span style="color:#ffffff;font-size:22px;font-weight:bold;letter-spacing:1px;">CalmSKIN</span>
                    </td>
                </tr>
                <tr>
                    <td style="padding:32px 28px 8px 28px;">
                        <h2 style="margin:0 0 16px 0;color:#1f2933;font-size:20px;" th:text="${subject}">Subject</h2>
                        <p style="margin:0 0 12px 0;color:#52606d;font-size:15px;">
                            Xin chào <span th:text="${recipientName}">bạn</span>,
                        </p>
                        <p style="margin:0;color:#3e4c59;font-size:15px;line-height:1.6;"
                           th:text="${bodyText}">Body</p>
                    </td>
                </tr>
                <tr>
                    <td style="padding:24px 28px 32px 28px;">
                        <p style="margin:0;color:#7b8794;font-size:13px;line-height:1.6;">
                            Trân trọng,<br/>Đội ngũ CalmSKIN
                        </p>
                    </td>
                </tr>
                <tr>
                    <td style="background-color:#f0f4f3;padding:18px 28px;text-align:center;">
                        <p style="margin:0 0 6px 0;color:#9aa5b1;font-size:12px;">
                            &copy; <span th:text="${year}">2026</span> CalmSKIN. Mọi quyền được bảo lưu.
                        </p>
                        <p style="margin:0;color:#9aa5b1;font-size:12px;">
                            <a th:href="${unsubscribeUrl}" style="color:#2e7d68;text-decoration:underline;">
                                Quản lý nhận email
                            </a>
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>

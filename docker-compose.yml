services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: calm_skin_maintenance
      POSTGRES_DB_USER_SERVICE: ${POSTGRES_DB_USER_SERVICE}
      POSTGRES_DB_PRODUCT_SERVICE: ${POSTGRES_DB_PRODUCT_SERVICE}
      POSTGRES_DB_INVENTORY_SERVICE: ${POSTGRES_DB_INVENTORY_SERVICE}
      POSTGRES_DB_ORDER_SERVICE: ${POSTGRES_DB_ORDER_SERVICE}
      POSTGRES_DB_PAYMENT_SERVICE: ${POSTGRES_DB_PAYMENT_SERVICE}
      POSTGRES_DB_NOTIFICATION_SERVICE: ${POSTGRES_DB_NOTIFICATION_SERVICE}
      POSTGRES_DB_PROMOTION_SERVICE: ${POSTGRES_DB_PROMOTION_SERVICE}
      POSTGRES_DB_REVIEW_SERVICE: ${POSTGRES_DB_REVIEW_SERVICE}
      POSTGRES_DB_SHIPPING_SERVICE: ${POSTGRES_DB_SHIPPING_SERVICE}
      POSTGRES_DB_SUBSCRIPTION_SERVICE: ${POSTGRES_DB_SUBSCRIPTION_SERVICE}
      POSTGRES_DB_AI_SKIN_ANALYSIS: ${POSTGRES_DB_AI_SKIN_ANALYSIS}
      POSTGRES_DB_CHATBOT: ${POSTGRES_DB_CHATBOT}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - calm-skin-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - calm-skin-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - calm-skin-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - calm-skin-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  discovery-service:
    build: ./discovery-service
    ports:
      - "8761:8761"
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=50.0 -XX:+UseG1GC -XX:MaxGCPauseMillis=100 -Xms64m -Xmx192m"
    networks:
      - calm-skin-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: "0.5"

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=50.0 -XX:+UseG1GC -XX:MaxGCPauseMillis=100 -Xms64m -Xmx192m"
      EUREKA_URI: http://discovery-service:8761/eureka
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      SPRING_DATA_REDIS_HOST: redis
      ZIPKIN_HOST: zipkin
    depends_on:
      discovery-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - calm-skin-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  user-service:

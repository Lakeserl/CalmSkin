    networks:
      - calm-skin-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9411/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./common/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - calm-skin-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - calm-skin-network
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

networks:
  calm-skin-network:
    driver: bridge

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
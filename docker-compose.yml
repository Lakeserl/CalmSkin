      resources:
        limits:
          memory: 384m
          cpus: "0.5"

  search-service:
    build: ./search-service
    expose:
      - "8093"
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=50.0 -XX:+UseG1GC -XX:MaxGCPauseMillis=100 -Xms64m -Xmx256m"
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      EUREKA_URI: http://discovery-service:8761/eureka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ZIPKIN_HOST: zipkin
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
    depends_on:
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - calm-skin-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8093/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  zipkin:
    image: openzipkin/zipkin:latest
    ports:
      - "9411:9411"
    networks:
      - calm-skin-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9411/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./common/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - calm-skin-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - calm-skin-network
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

networks:
  calm-skin-network:
    driver: bridge

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
  elasticsearch-data:
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - discovery-service
          - api-gateway
          - user-service
          - product-service
          - inventory-service
          - order-service
          - payment-service
          - notification-service
          - promotion-service
          - review-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: ./mvnw -B -ntp -DskipTests verify

  image-scan:
    name: image scan (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        service:
          - discovery-service
          - api-gateway
          - user-service
          - product-service
          - inventory-service
          - order-service
          - payment-service
          - notification-service
          - promotion-service
          - review-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: ${{ matrix.service }}
        run: docker build -t calmskin/${{ matrix.service }}:${{ github.sha }} .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: calmskin/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
